# replace "yourstack" with replace all with your stack name
# replace "yourdomain.com" with replace all with your actual domain
# replace "yourimage" with your docker image name
# replace "youremail" with your actual email for certificate notifications

services:
  traefik:
    image: traefik:v3.6
    command:
      - --api.insecure=false
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=youremail@protonmail.com
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    networks: [edge]
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-lets-encrypt:/letsencrypt
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure

  web:
    image: ghcr.io/jackjakarta/yourimage:${TAG_VERSION}
    command: ['node', 'server.js']
    networks: [edge]
    env_file:
      - .env
    deploy:
      replicas: 2
      placement:
        preferences:
          - spread: node.hostname
      resources:
        limits:
          cpus: '1.50'
          memory: 3072M
        reservations:
          cpus: '0.50'
          memory: 512M
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 20s
        max_failure_ratio: 0.2
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=yourstack_edge

        # main router
        - traefik.http.routers.yourstack.rule=Host(`yourdomain.com`)
        - traefik.http.routers.yourstack.entrypoints=websecure
        - traefik.http.routers.yourstack.tls=true
        - traefik.http.routers.yourstack.tls.certresolver=myresolver
        - traefik.http.services.yourstack.loadbalancer.server.port=3000

        # www to non-www redirect
        - traefik.http.routers.yourstack-www.rule=Host(`www.yourdomain.com`)
        - traefik.http.routers.yourstack-www.entrypoints=websecure
        - traefik.http.routers.yourstack-www.tls=true
        - traefik.http.routers.yourstack-www.tls.certresolver=myresolver
        - traefik.http.routers.yourstack-www.middlewares=www-redirect
        - traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\.(.*)
        - traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}
        - traefik.http.middlewares.www-redirect.redirectregex.permanent=true

networks:
  edge:
    driver: overlay

volumes:
  traefik-lets-encrypt:
